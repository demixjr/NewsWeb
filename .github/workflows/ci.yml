name: CI Pipeline

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, review_requested, submitted]
    branches:
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NewsWebsite.sln

      - name: Build
        run: dotnet build NewsWebsite.sln --no-restore

      - name: Run tests
        run: dotnet test NewsWebsite.sln --no-build --verbosity normal --logger "trx;LogFileName=report.trx"

analysis:
  name: Static Analysis / Metrics
  runs-on: ubuntu-latest
  needs: build
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    #Cloc
    - name: Count lines of code with Cloc
      run: |
        sudo apt-get update
        sudo apt-get install -y cloc
        cloc src/ > cloc-report.txt
        cat cloc-report.txt

    #SonarQube 
    - name: Run SonarQube analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
        unzip sonar-scanner-cli-4.8.0.2856-linux.zip
        export PATH=$PATH:$(pwd)/sonar-scanner-4.8.0.2856-linux/bin
        sonar-scanner

  review-check:
    name: Code Review Check for develop
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify approved code review
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const approved = reviews.some(review => review.state === 'APPROVED');

            if (!approved) {
              core.setFailed("Код-рев’ю не схвалено");
            }