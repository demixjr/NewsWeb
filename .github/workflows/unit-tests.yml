name: .NET Core Unit Tests

on:
  push:
    branches:
      - 'feature/*'
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NewsWebsite.sln

      - name: Build
        run: dotnet build NewsWebsite.sln --no-restore

      - name: Run unit tests
        run: dotnet test NewsWebsite.sln --no-build --verbosity normal
